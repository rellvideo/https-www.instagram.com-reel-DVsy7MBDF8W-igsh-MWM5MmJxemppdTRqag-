<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reels </title>
  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    }

    body{
      background:#000;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .screen{
      width:390px;
      height:844px;
      background:#000;
      position:relative;
      overflow:hidden;
      border-radius:30px;
      box-shadow:0 24px 70px rgba(0,0,0,.55);
      border:8px solid #111;
    }

    .bg{
      position:absolute;
      inset:0;
      background:
        linear-gradient(to bottom, rgba(0,0,0,.25), rgba(0,0,0,.08) 20%, rgba(0,0,0,.22) 55%, rgba(0,0,0,.72)),
        radial-gradient(circle at center, #2d2d2d 0%, #111 35%, #000 75%);
      filter:blur(6px);
      transform:scale(1.05);
    }

    .notch{
      position:absolute;
      top:10px;
      left:50%;
      transform:translateX(-50%);
      width:120px;
      height:26px;
      border-radius:999px;
      background:#090909;
      z-index:30;
    }

    .demo{
      position:absolute;
      top:58px;
      left:50%;
      transform:translateX(-50%);
      z-index:20;
      background:#ffd54f;
      color:#111;
      padding:7px 14px;
      border-radius:999px;
      font-size:12px;
      font-weight:800;
      letter-spacing:.7px;
      box-shadow:0 8px 22px rgba(0,0,0,.25);
    }

    .topbar{
      position:absolute;
      top:58px;
      left:16px;
      right:16px;
      z-index:15;
      display:flex;
      align-items:center;
      justify-content:space-between;
      color:#fff;
    }

    .topbar .title{
      font-size:24px;
      font-weight:700;
    }

    .camera-icon{
      font-size:22px;
      opacity:.95;
    }

    .side{
      position:absolute;
      right:12px;
      bottom:168px;
      z-index:14;
      color:#fff;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:18px;
    }

    .side-item{
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:6px;
      font-size:12px;
      text-shadow:0 2px 6px rgba(0,0,0,.45);
    }

    .circle{
      width:44px;
      height:44px;
      border-radius:50%;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.08);
      display:flex;
      align-items:center;
      justify-content:center;
      backdrop-filter:blur(4px);
      font-size:20px;
    }

    .bottom-info{
      position:absolute;
      left:14px;
      right:78px;
      bottom:122px;
      z-index:14;
      color:#fff;
    }

    .user-row{
      display:flex;
      align-items:center;
      gap:10px;
      margin-bottom:10px;
    }

    .avatar{
      width:34px;
      height:34px;
      border-radius:50%;
      background:linear-gradient(45deg,#f9ce34,#ee2a7b,#6228d7);
      padding:2px;
      flex-shrink:0;
    }

    .avatar-inner{
      width:100%;
      height:100%;
      border-radius:50%;
      background:#1d1d1d;
      border:2px solid #111;
    }

    .username{
      font-size:15px;
      font-weight:700;
    }

    .follow{
      margin-left:2px;
      padding:6px 12px;
      border:1px solid rgba(255,255,255,.85);
      border-radius:8px;
      background:transparent;
      color:#fff;
      font-size:13px;
      font-weight:600;
    }

    .caption{
      font-size:14px;
      line-height:1.45;
      margin-bottom:8px;
      color:rgba(255,255,255,.96);
    }

    .audio{
      font-size:13px;
      color:rgba(255,255,255,.88);
    }

    .center-lock{
      position:absolute;
      inset:0;
      z-index:10;
      display:flex;
      align-items:center;
      justify-content:center;
      pointer-events:none;
    }

    .lock-box{
      width:110px;
      height:110px;
      border-radius:28px;
      background:rgba(255,255,255,.07);
      border:1px solid rgba(255,255,255,.08);
      display:flex;
      align-items:center;
      justify-content:center;
      color:#fff;
      font-size:42px;
      backdrop-filter:blur(7px);
      box-shadow:0 12px 30px rgba(0,0,0,.25);
    }

    .sheet{
      position:absolute;
      left:0;
      right:0;
      bottom:0;
      z-index:25;
      background:#fff;
      border-radius:26px 26px 0 0;
      padding:22px 18px 26px;
      box-shadow:0 -10px 35px rgba(0,0,0,.28);
    }

    .handle{
      width:42px;
      height:5px;
      background:#d7d7d7;
      border-radius:999px;
      margin:0 auto 18px;
    }

    .sheet h2{
      text-align:center;
      font-size:23px;
      line-height:1.2;
      color:#111;
      margin-bottom:10px;
    }

    .sheet p{
      text-align:center;
      color:#666;
      font-size:14px;
      line-height:1.5;
      margin-bottom:18px;
    }

    .btn{
      width:100%;
      height:46px;
      border:none;
      border-radius:10px;
      font-size:15px;
      font-weight:700;
      margin-bottom:10px;
    }

    .btn.primary{
      background:#0095f6;
      color:#fff;
    }

    .btn.secondary{
      background:#f2f2f2;
      color:#111;
    }

    .note{
      margin-top:4px;
      text-align:center;
      font-size:11px;
      color:#999;
      line-height:1.4;
    }

    @media (max-width:420px){
      .screen{
        width:100vw;
        height:100vh;
        border:none;
        border-radius:0;
      }
      .notch{
        display:none;
      }
    }
  </style>
</head>
<body>
  <div class="screen">
    <div class="bg"></div>
    <div class="notch"></div>

  
    <div class="topbar">
      <div class="title">Reels</div>
      <div class="camera-icon">📷</div>
    </div>

    <div class="center-lock">
      <div class="lock-box">🔒</div>
    </div>

    <div class="side">
      <div class="side-item">
        <div class="circle">♡</div>
        <span>18,4 B</span>
      </div>
      <div class="side-item">
        <div class="circle">💬</div>
        <span>842</span>
      </div>
      <div class="side-item">
        <div class="circle">✈</div>
        <span>Paylaş</span>
      </div>
      <div class="side-item">
        <div class="circle">⋯</div>
      </div>
    </div>

    <div class="bottom-info">
      <div class="user-row">
        <div class="avatar"><div class="avatar-inner"></div></div>
        <div class="username">mehmetciftci</div>
        <button class="follow" type="button">Takip Et</button>
      </div>

      <div class="caption">
        Bu reels içeriğini görmek için önce giriş yapılması gerekiyor.
      </div>

      <div class="audio">🎵 Orijinal ses - mehmetciftci</div>
    </div>

    <div class="sheet">
      <div class="handle"></div>
      <h2>Reels videolarını görmek için giriş yap</h2>
      <p>Videoları izlemek, beğenmek ve yorum yapmak için hesabına giriş yap.</p>

    <a href="login.html">
<button class="btn primary">Giriş Yap</button>
</a>
      
      <div class="note">
   
      </div>
    </div>
  </div>
</body>
</html>
